services:
  - type: web
    name: tb-mulya-abadi-api
    env: node
    plan: free
    region: singapore
    buildCommand: npm install && npm run build && npm run prisma:migrate:deploy
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: APP_NAME
        value: "TB Mulya Abadi Backend API"
      - key: DATABASE_URL
        fromDatabase:
          name: tb-mulya-abadi-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: BCRYPT_SALT_ROUNDS
        value: 12
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 100
      - key: LOG_LEVEL
        value: info

databases:
  - name: tb-mulya-abadi-db
    plan: free
    region: singapore
